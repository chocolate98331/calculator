<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F4F1E9">
    <title>台股存股筆記本 Pro</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 設定專屬大地色系 (Earth Tones) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              earth: {
                50: '#F9F8F6',
                100: '#F4F1E9',
                200: '#E6E1D6',
                300: '#D1CCC4',
                400: '#A39E93',
                500: '#7A756B',
                600: '#52604A',
                700: '#3E4A37',
                800: '#2A3324',
                900: '#2C2B29',
                accent: '#BFA054',
                profit: '#C06C5B',
                loss: '#52604A',
              }
            },
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
            },
            boxShadow: {
              'soft': '0 8px 30px rgba(0, 0, 0, 0.04)',
              'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)',
            }
          }
        }
      }
    </script>

    <!-- 引入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 🌟 新增：引入 SheetJS 用於處理 Excel (.xlsx) 檔案 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.18.5/package/dist/xlsx.full.min.js"></script>
    
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { background-color: #F9F8F6; color: #2C2B29; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=date] { appearance: none; -webkit-appearance: none; }
        input[type=date]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // Icons
        const IconLeaf = () => <svg className="w-6 h-6 inline-block" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"></path><path strokeLinecap="round" strokeLinejoin="round" d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path></svg>;
        const IconSettings = () => <svg className="w-5 h-5 inline-block" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>;
        const IconPieChart = () => <svg className="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path strokeLinecap="round" strokeLinejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>;
        const IconPlant = () => <svg className="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 22v-8m0 0a5 5 0 0 0-5-5h-.5a5.5 5.5 0 0 0 5.5 5.5v-.5Zm0 0a5 5 0 0 1 5-5h.5a5.5 5.5 0 0 1-5.5 5.5v-.5Z"></path><path strokeLinecap="round" strokeLinejoin="round" d="M12 14v-4a4 4 0 0 0-4-4h-.5a4.5 4.5 0 0 0 4.5 4.5v-.5Zm0 0a4 4 0 0 1 4-4h.5A4.5 4.5 0 0 1 12 14v-.5Z"></path></svg>;
        const IconPlus = () => <svg className="w-4 h-4 inline-block" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4"></path></svg>;
        const IconTrash = () => <svg className="w-4 h-4 inline-block" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>;
        const IconRefresh = ({ className }) => <svg className={`w-4 h-4 inline-block ${className}`} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>;
        const IconCheck = () => <svg className="w-5 h-5 inline-block" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"></path></svg>;
        const IconEdit = () => <svg className="w-4 h-4 inline-block" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.89 1.147l-2.8.9a.375.375 0 01-.48-.48l.9-2.8a4.5 4.5 0 011.146-1.89L16.862 4.487zm0 0L19.5 7.125"></path></svg>;
        const IconFilter = () => <svg className="w-4 h-4 inline-block text-earth-400" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3c2.755 0 5.455.232 8.083.678.533.09.917.556.917 1.096v1.044a2.25 2.25 0 0 1-.659 1.591l-5.432 5.432a2.25 2.25 0 0 0-.659 1.591v2.927a2.25 2.25 0 0 1-1.244 2.013L9.75 21v-6.568a2.25 2.25 0 0 0-.659-1.591L3.659 7.409A2.25 2.25 0 0 1 3 5.818V4.774c0-.54.384-1.006.917-1.096A48.32 48.32 0 0 1 12 3Z"></path></svg>;
        const IconSearch = () => <svg className="w-4 h-4 inline-block" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path></svg>;
        const IconExcel = () => <svg className="w-4 h-4 inline-block mr-2" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"></path></svg>;
        const IconUpload = () => <svg className="w-4 h-4 inline-block mr-2" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"></path></svg>;

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-[24px] shadow-soft border border-earth-100 ${className}`}>{children}</div>
        );

        const BASE_FEE_RATE = 0.001425;
        const TAX_RATE = 0.003;

        const STOCK_MAP = {
            '0056': '元大高股息', '00878': '國泰永續高股息', '0050': '元大台灣50',
            '5536': '聖暉*', '7703': '銳澤', '9925': '新光保全', '1477': '聚陽', '3293': '鈊象',
            '2330': '台積電', '00929': '復華科技優息', '00919': '群益精選高息'
        };

        const INITIAL_DIVIDEND_DB = {
            '0056':  { cash: 3.63, stock: 0, note: '2024全年' },
            '00878': { cash: 2.01, stock: 0, note: '2024全年' },
            '0050':  { cash: 4.00, stock: 0, note: '2024全年' },
            '5536':  { cash: 15.0, stock: 0, note: '2024獲利' },
            '7703':  { cash: 7.0,  stock: 0, note: '2023獲利' },
            '9925':  { cash: 2.0,  stock: 0, note: '穩定配發' },
            '1477':  { cash: 16.4, stock: 0, note: '2023獲利' },
            '3293':  { cash: 35.0, stock: 10.0, note: '2024配發' },
        };

        const getTodayString = () => {
            const tzoffset = (new Date()).getTimezoneOffset() * 60000;
            return (new Date(Date.now() - tzoffset)).toISOString().split('T')[0];
        };

        const App = () => {
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('earthStockTx');
                return saved ? JSON.parse(saved) : [];
            });
            
            const [activeTab, setActiveTab] = useState('portfolio'); 
            const [currentPrices, setCurrentPrices] = useState({});
            const [isFetching, setIsFetching] = useState(false);
            const [fetchMsg, setFetchMsg] = useState('');
            
            const [brokerDiscount, setBrokerDiscount] = useState(() => {
                const saved = localStorage.getItem('earthBrokerDiscount');
                return saved ? parseFloat(saved) : 0.6;
            }); 
            const [minFee, setMinFee] = useState(() => {
                const saved = localStorage.getItem('earthMinFee');
                return saved ? parseInt(saved) : 1;
            }); 
            const [showSettings, setShowSettings] = useState(false);
            
            const [filterMonth, setFilterMonth] = useState('all');
            const [filterStock, setFilterStock] = useState('all');

            const [dividendPolicies, setDividendPolicies] = useState(() => {
                const saved = localStorage.getItem('earthDivPolicies');
                return saved ? JSON.parse(saved) : INITIAL_DIVIDEND_DB;
            });
            const [editingPolicyCode, setEditingPolicyCode] = useState(null);
            const [editForm, setEditForm] = useState({ cash: '' });

            const [form, setForm] = useState({ date: getTodayString(), code: '', name: '', price: '', shares: '' });
            const [dividendForm, setDividendForm] = useState({ targetCode: '', totalDividend: '', targetPrice: '' });

            const fileInputRef = useRef(null);

            // 資料改變時存入 LocalStorage
            useEffect(() => { localStorage.setItem('earthStockTx', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('earthDivPolicies', JSON.stringify(dividendPolicies)); }, [dividendPolicies]);
            useEffect(() => { localStorage.setItem('earthBrokerDiscount', brokerDiscount.toString()); }, [brokerDiscount]);
            useEffect(() => { localStorage.setItem('earthMinFee', minFee.toString()); }, [minFee]);

            // --- 🌟 Excel 備份與還原功能 (使用 SheetJS) ---
            const handleExportExcel = () => {
                try {
                    // 1. 建立「交易紀錄」分頁
                    const wsTxData = transactions.map(t => ({
                        '系統ID(請勿修改)': t.id,
                        '日期(YYYY-MM-DD)': t.date,
                        '代號': t.code,
                        '名稱': t.name,
                        '單價': t.price,
                        '股數': t.shares,
                        '手續費': t.fee,
                        '總成本': t.totalCost,
                        '是否為股息再投入': t.isReinvest ? '是' : '否'
                    }));
                    const wsTx = XLSX.utils.json_to_sheet(wsTxData);

                    // 2. 建立「股利政策」分頁
                    const wsDivData = Object.keys(dividendPolicies).map(code => ({
                        '代號': code,
                        '現金股利(元)': dividendPolicies[code].cash,
                        '股票股利(元)': dividendPolicies[code].stock || 0,
                        '備註': dividendPolicies[code].note || ''
                    }));
                    const wsDiv = XLSX.utils.json_to_sheet(wsDivData);

                    // 3. 建立「系統設定」分頁
                    const wsSettingsData = [{
                        '手續費折數': brokerDiscount,
                        '最低手續費(元)': minFee
                    }];
                    const wsSettings = XLSX.utils.json_to_sheet(wsSettingsData);

                    // 將三個分頁打包成一個 Excel 活頁簿
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, wsTx, "交易紀錄");
                    XLSX.utils.book_append_sheet(wb, wsDiv, "股利政策");
                    XLSX.utils.book_append_sheet(wb, wsSettings, "系統設定");

                    // 觸發下載
                    XLSX.writeFile(wb, `存股管家備份_${getTodayString()}.xlsx`);
                    
                    setShowSettings(false);
                    setFetchMsg('✅ 成功匯出 Excel 備份檔！');
                    setTimeout(() => setFetchMsg(''), 3000);
                } catch (error) {
                    console.error(error);
                    alert("匯出 Excel 發生錯誤，請稍後再試。");
                }
            };

            const handleImportClick = () => { fileInputRef.current.click(); };

            const handleImportExcel = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        // 讀取 Excel 檔案 (cellDates 確保日期格式能被正確解析)
                        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
                        
                        let importedTxCount = 0;
                        let newBrokerDiscount = brokerDiscount;
                        let newMinFee = minFee;

                        // 1. 讀取系統設定 (優先讀取，以便計算缺少的手續費)
                        if (workbook.Sheets["系統設定"]) {
                            const setRows = XLSX.utils.sheet_to_json(workbook.Sheets["系統設定"]);
                            if (setRows.length > 0) {
                                newBrokerDiscount = parseFloat(setRows[0]['手續費折數']) || 0.6;
                                newMinFee = parseInt(setRows[0]['最低手續費(元)']) || 1;
                            }
                        }

                        // 2. 讀取交易紀錄
                        let newTransactions = [];
                        if (workbook.Sheets["交易紀錄"]) {
                            // 設定 raw: false, dateNF 讓 Excel 裡的日期一律轉成 YYYY-MM-DD 字串
                            const txRows = XLSX.utils.sheet_to_json(workbook.Sheets["交易紀錄"], { raw: false, dateNF: 'yyyy-mm-dd' });
                            
                            newTransactions = txRows.map(row => {
                                const price = parseFloat(row['單價']);
                                const shares = parseInt(row['股數']);
                                const calcFee = Math.max(Math.floor(price * shares * BASE_FEE_RATE * newBrokerDiscount), newMinFee);
                                
                                return {
                                    id: row['系統ID(請勿修改)'] || Date.now() + Math.random(), // 容錯處理：如果手動新增忘記給ID
                                    date: row['日期(YYYY-MM-DD)'] || getTodayString(),
                                    code: String(row['代號']).trim(),
                                    name: row['名稱'] || String(row['代號']).trim(),
                                    price: price,
                                    shares: shares,
                                    fee: row['手續費'] !== undefined ? parseInt(row['手續費']) : calcFee,
                                    totalCost: row['總成本'] !== undefined ? parseFloat(row['總成本']) : (price * shares + calcFee),
                                    isReinvest: row['是否為股息再投入'] === '是' || row['是否為股息再投入'] === 'TRUE' || row['是否為股息再投入'] === true
                                };
                            }).filter(t => t.code && !isNaN(t.price) && !isNaN(t.shares)); // 過濾掉空白列
                            
                            importedTxCount = newTransactions.length;
                        }

                        // 3. 讀取股利政策
                        let newDivPolicies = { ...dividendPolicies };
                        if (workbook.Sheets["股利政策"]) {
                            const divRows = XLSX.utils.sheet_to_json(workbook.Sheets["股利政策"]);
                            divRows.forEach(row => {
                                if (row['代號']) {
                                    newDivPolicies[String(row['代號']).trim()] = {
                                        cash: parseFloat(row['現金股利(元)']) || 0,
                                        stock: parseFloat(row['股票股利(元)']) || 0,
                                        note: row['備註'] || ''
                                    };
                                }
                            });
                        }

                        // 確認並寫入
                        if (window.confirm(`即將匯入 ${importedTxCount} 筆交易紀錄與設定。\n這將會覆蓋您目前的資料，確定要執行嗎？`)) {
                            setTransactions(newTransactions);
                            setDividendPolicies(newDivPolicies);
                            setBrokerDiscount(newBrokerDiscount);
                            setMinFee(newMinFee);
                            
                            setShowSettings(false);
                            setFetchMsg('✨ Excel 資料已成功還原！');
                            setTimeout(() => setFetchMsg(''), 3000);
                        }

                    } catch (err) {
                        console.error(err);
                        alert("❌ 檔案讀取失敗。請確認是否為系統匯出的 .xlsx 檔案，或資料格式有無錯誤。");
                    }
                    event.target.value = null; // 清空選擇，允許重複匯入同一個檔案
                };
                reader.readAsArrayBuffer(file);
            };

            // --- 核心運算 ---
            const fetchMarketPrices = async () => {
                setIsFetching(true); setFetchMsg('📡 自動抓取上市股價中...');
                try {
                    const res = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
                    if (!res.ok) throw new Error('API Error');
                    const data = await res.json();
                    
                    const newPrices = { ...currentPrices };
                    let count = 0;
                    const twseMap = {};
                    data.forEach(s => twseMap[s.Code] = parseFloat(s.ClosingPrice));

                    const uniqueCodes = [...new Set(transactions.map(t => t.code))];
                    uniqueCodes.forEach(c => {
                        if (twseMap[c]) { newPrices[c] = twseMap[c]; count++; }
                    });

                    setCurrentPrices(newPrices);
                    setFetchMsg(`✨ 成功自動更新 ${count} 檔股票！`);
                } catch (e) {
                    setFetchMsg('更新失敗，請檢查網路連線');
                } finally {
                    setIsFetching(false);
                    setTimeout(() => setFetchMsg(''), 4000);
                }
            };

            const handleAddTransaction = () => {
                if (!form.date || !form.code || !form.price || !form.shares) return;
                const p = parseFloat(form.price); const s = parseInt(form.shares);
                const fee = Math.max(Math.floor(p * s * BASE_FEE_RATE * brokerDiscount), minFee);
                const newTx = { id: Date.now(), ...form, name: form.name || form.code, price: p, shares: s, fee, totalCost: (p * s) + fee, isReinvest: false };
                
                setTransactions([...transactions, newTx]);
                if (!currentPrices[form.code]) setCurrentPrices(prev => ({ ...prev, [form.code]: p }));
                setForm({ ...form, date: getTodayString(), code: '', name: '', price: '', shares: '' });
            };

            const executeReinvest = (code, p, s, fee) => {
                if (s <= 0) return;
                const newTx = { id: Date.now(), date: getTodayString(), code, name: STOCK_MAP[code] || code, price: p, shares: s, fee, totalCost: (p * s) + fee, isReinvest: true };
                setTransactions([...transactions, newTx]);
                setDividendForm({ targetCode: '', totalDividend: '', targetPrice: '' });
                setActiveTab('portfolio');
                alert(`🌱 成功將 ${s} 股 ${newTx.name} 種入庫存！`);
            };

            const stats = useMemo(() => {
                let totalInv = 0, totalVal = 0, expectedDiv = 0;
                const holdings = {};

                transactions.forEach(t => {
                    totalInv += t.totalCost;
                    const cp = currentPrices[t.code] || t.price;
                    const val = cp * t.shares;
                    const f = Math.max(Math.floor(val * BASE_FEE_RATE * brokerDiscount), minFee);
                    const tax = Math.floor(val * TAX_RATE);
                    totalVal += (val - f - tax);

                    if (!holdings[t.code]) holdings[t.code] = { code: t.code, name: t.name, shares: 0, currentPrice: cp };
                    holdings[t.code].shares += t.shares;
                    holdings[t.code].currentPrice = cp;
                });

                const divBreakdown = Object.values(holdings).map(h => {
                    const pol = dividendPolicies[h.code] || { cash: 0, stock: 0 };
                    const cInc = Math.floor(h.shares * pol.cash);
                    expectedDiv += cInc;
                    return { ...h, cashIncome: cInc, policy: pol };
                });

                return { 
                    totalInv, totalVal, profit: totalVal - totalInv, rate: totalInv ? ((totalVal - totalInv)/totalInv)*100 : 0, 
                    expectedDiv, divBreakdown 
                };
            }, [transactions, currentPrices, brokerDiscount, minFee, dividendPolicies]);

            const availableMonths = useMemo(() => {
                const months = transactions.map(t => t.date.substring(0, 7));
                return [...new Set(months)].sort((a, b) => b.localeCompare(a));
            }, [transactions]);

            const availableStocks = useMemo(() => {
                const unique = {};
                transactions.forEach(t => { if (!unique[t.code]) unique[t.code] = t.name; });
                return Object.keys(unique).sort().map(code => ({ code, name: unique[code] }));
            }, [transactions]);

            const filteredTransactions = useMemo(() => {
                return transactions.filter(t => {
                    const matchMonth = filterMonth === 'all' || t.date.substring(0, 7) === filterMonth;
                    const matchStock = filterStock === 'all' || t.code === filterStock;
                    return matchMonth && matchStock;
                });
            }, [transactions, filterMonth, filterStock]);

            const filteredInvested = useMemo(() => {
                if (filterMonth === 'all' && filterStock === 'all') return 0;
                return filteredTransactions.reduce((sum, t) => sum + t.totalCost, 0);
            }, [filteredTransactions, filterMonth, filterStock]);

            const divResult = useMemo(() => {
                const amt = parseFloat(dividendForm.totalDividend); const p = parseFloat(dividendForm.targetPrice);
                if (!amt || !p || p <= 0) return null;
                const rate = BASE_FEE_RATE * brokerDiscount;
                const maxS = Math.floor(amt / (p * (1 + rate)));
                let fee = Math.max(Math.floor(maxS * p * rate), minFee);
                let spent = (maxS * p) + fee;
                
                if (spent > amt) {
                    const adjS = maxS - 1;
                    fee = Math.max(Math.floor(adjS * p * rate), minFee);
                    spent = (adjS * p) + fee;
                    return { shares: adjS, spent, rem: amt - spent, fee };
                }
                return { shares: maxS, spent, rem: amt - spent, fee };
            }, [dividendForm, brokerDiscount, minFee]);

            return (
                <div className="max-w-4xl mx-auto p-4 sm:p-6 space-y-6 pb-24">
                    {/* 隱藏的 Excel 檔案選擇器 */}
                    <input 
                        type="file" 
                        accept=".xlsx, .xls" 
                        ref={fileInputRef} 
                        onChange={handleImportExcel} 
                        style={{ display: 'none' }} 
                    />

                    {/* Header */}
                    <header className="bg-gradient-to-br from-[#52604A] to-[#6A7B60] text-[#F9F8F6] p-6 sm:p-8 rounded-[32px] shadow-soft flex flex-col sm:flex-row justify-between items-start sm:items-center relative z-20 overflow-hidden">
                        <div className="absolute top-0 right-0 -mr-16 -mt-16 opacity-10">
                            <svg width="200" height="200" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                        </div>
                        <div className="relative z-10 mb-4 sm:mb-0">
                            <h1 className="text-2xl sm:text-3xl font-bold flex items-center gap-2 tracking-wide">
                                <IconLeaf /> 存股管家
                            </h1>
                            <p className="text-sm text-[#D1CCC4] mt-2 font-medium">慢慢變富，享受時間的複利。</p>
                        </div>
                        <div className="flex gap-3 relative z-10 w-full sm:w-auto">
                            <button onClick={fetchMarketPrices} disabled={isFetching} className="flex-1 sm:flex-none justify-center bg-white/20 hover:bg-white/30 px-4 py-3 rounded-2xl backdrop-blur-md transition-all flex items-center gap-2 font-bold shadow-sm">
                                <IconRefresh className={isFetching ? 'animate-spin' : ''} />
                                <span className="text-sm">更新市價</span>
                            </button>
                            <button onClick={() => setShowSettings(!showSettings)} className="flex-none justify-center bg-white/10 hover:bg-white/20 px-4 py-3 rounded-2xl backdrop-blur-md transition-all flex items-center gap-2">
                                <IconSettings />
                            </button>
                        </div>
                        
                        {/* 擴充的設定下拉選單 (包含 Excel 匯出匯入) */}
                        {showSettings && (
                            <div className="absolute right-6 top-24 bg-[#F9F8F6] text-earth-900 rounded-[20px] shadow-[0_10px_40px_rgba(0,0,0,0.1)] p-3 w-56 z-50 text-sm border border-earth-200">
                                <div className="p-2 text-earth-400 font-bold text-xs uppercase tracking-wider mb-1">手續費設定</div>
                                <button onClick={() => {setBrokerDiscount(0.6); setMinFee(1); setShowSettings(false);}} className="w-full text-left p-3 hover:bg-earth-100 rounded-xl transition-colors font-medium flex justify-between items-center">
                                    <span>一般 (6折, 低消1)</span>
                                    {brokerDiscount === 0.6 && <span className="text-earth-600">✓</span>}
                                </button>
                                <button onClick={() => {setBrokerDiscount(0.28); setMinFee(1); setShowSettings(false);}} className="w-full text-left p-3 hover:bg-earth-100 rounded-xl transition-colors font-medium flex justify-between items-center mb-2">
                                    <span>數位 (2.8折, 低消1)</span>
                                    {brokerDiscount === 0.28 && <span className="text-earth-600">✓</span>}
                                </button>
                                
                                <div className="border-t border-earth-200 pt-2 mb-1"></div>
                                <div className="p-2 text-earth-400 font-bold text-xs uppercase tracking-wider mb-1">Excel 資料中心</div>
                                <button onClick={handleExportExcel} className="w-full text-left p-3 hover:bg-earth-100 rounded-xl transition-colors font-medium text-earth-600 flex items-center">
                                    <IconExcel /> 匯出為 Excel
                                </button>
                                <button onClick={handleImportClick} className="w-full text-left p-3 hover:bg-earth-100 rounded-xl transition-colors font-medium text-earth-accent flex items-center">
                                    <IconUpload /> 從 Excel 匯入
                                </button>
                            </div>
                        )}
                    </header>

                    {/* 提示訊息 */}
                    {fetchMsg && (
                        <div className="bg-white border border-earth-600/20 text-earth-700 px-4 py-3 rounded-2xl text-sm font-bold text-center shadow-soft animate-in fade-in slide-in-from-top-4 flex items-center justify-center gap-2">
                            {fetchMsg}
                        </div>
                    )}

                    {/* Tabs */}
                    <div className="flex bg-earth-200/50 p-1.5 rounded-[20px] max-w-md mx-auto">
                        <button onClick={() => setActiveTab('portfolio')} className={`flex-1 py-3 rounded-[16px] text-sm font-bold transition-all duration-300 flex justify-center items-center ${activeTab === 'portfolio' ? 'bg-white text-earth-700 shadow-sm' : 'text-earth-500 hover:text-earth-700'}`}>
                            <IconPieChart /> 庫存損益
                        </button>
                        <button onClick={() => setActiveTab('dividend')} className={`flex-1 py-3 rounded-[16px] text-sm font-bold transition-all duration-300 flex justify-center items-center ${activeTab === 'dividend' ? 'bg-white text-earth-700 shadow-sm' : 'text-earth-500 hover:text-earth-700'}`}>
                            <IconPlant /> 股利播種
                        </button>
                    </div>

                    {/* 頁面一：庫存損益 */}
                    {activeTab === 'portfolio' && (
                        <div className="space-y-6 animate-in fade-in duration-500">
                            {/* 狀態卡片 */}
                            <div className="grid grid-cols-2 gap-4">
                                <Card className="p-5 flex flex-col justify-center">
                                    <div className="text-xs text-earth-400 font-medium mb-1">總投入成本</div>
                                    <div className="font-extrabold text-2xl text-earth-900">${stats.totalInv.toLocaleString()}</div>
                                </Card>
                                <Card className="p-5 flex flex-col justify-center relative overflow-hidden">
                                    <div className={`absolute right-0 top-0 w-16 h-16 rounded-bl-full opacity-10 ${stats.profit >= 0 ? 'bg-earth-profit' : 'bg-earth-loss'}`}></div>
                                    <div className="text-xs text-earth-400 font-medium mb-1 flex justify-between">
                                        <span>預估損益</span>
                                        <span className={`font-bold ${stats.profit >= 0 ? 'text-earth-profit' : 'text-earth-loss'}`}>
                                            {stats.rate.toFixed(1)}%
                                        </span>
                                    </div>
                                    <div className={`font-extrabold text-2xl ${stats.profit >= 0 ? 'text-earth-profit' : 'text-earth-loss'}`}>
                                        {stats.profit >= 0 ? '+' : ''}{Math.round(stats.profit).toLocaleString()}
                                    </div>
                                </Card>
                            </div>

                            {/* 新增紀錄 */}
                            <Card className="p-5 sm:p-6 bg-earth-50/50 border-none shadow-inner-soft">
                                <div className="font-bold text-sm mb-4 flex items-center gap-1 text-earth-700">
                                    <IconPlus /> 紀錄新的買入
                                </div>
                                <div className="grid grid-cols-2 sm:grid-cols-5 gap-3">
                                    <div className="col-span-2 sm:col-span-1">
                                        <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="w-full p-3 bg-white border border-earth-200 rounded-xl text-sm focus:ring-2 focus:ring-earth-600 outline-none text-earth-700" />
                                    </div>
                                    <input type="text" placeholder="代號 (如 0056)" value={form.code} onChange={e => setForm({...form, code: e.target.value, name: STOCK_MAP[e.target.value]||form.name})} className="p-3 bg-white border border-earth-200 rounded-xl text-sm uppercase focus:ring-2 focus:ring-earth-600 outline-none" />
                                    <input type="text" placeholder="名稱 (自動)" value={form.name} onChange={e => setForm({...form, name: e.target.value})} className="p-3 bg-earth-100/50 border border-earth-200 rounded-xl text-sm focus:ring-2 focus:ring-earth-600 outline-none" />
                                    <input type="number" placeholder="單價" value={form.price} onChange={e => setForm({...form, price: e.target.value})} className="p-3 bg-white border border-earth-200 rounded-xl text-sm focus:ring-2 focus:ring-earth-600 outline-none" />
                                    <input type="number" placeholder="股數" value={form.shares} onChange={e => setForm({...form, shares: e.target.value})} className="p-3 bg-white border border-earth-200 rounded-xl text-sm focus:ring-2 focus:ring-earth-600 outline-none" />
                                    <button onClick={handleAddTransaction} className="col-span-2 sm:col-span-5 bg-earth-600 hover:bg-earth-700 text-white p-3 rounded-xl text-sm font-bold transition-colors shadow-sm mt-1">
                                        存入紀錄
                                    </button>
                                </div>
                            </Card>

                            {/* 庫存列表 */}
                            <Card className="overflow-hidden bg-white">
                                <div className="p-4 border-b border-earth-100 flex flex-col lg:flex-row justify-between items-start lg:items-center bg-earth-50/30 gap-4">
                                    <div className="flex items-center gap-2">
                                        <span className="font-bold text-earth-800 text-sm">持有明細</span>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:gap-3 w-full lg:w-auto">
                                        {(filterMonth !== 'all' || filterStock !== 'all') && (
                                            <div className="text-xs font-bold text-earth-profit bg-earth-profit/10 px-2 py-2 rounded-lg whitespace-nowrap w-full sm:w-auto text-center sm:text-left">
                                                篩選投入: <span className="text-sm">${filteredInvested.toLocaleString()}</span>
                                            </div>
                                        )}
                                        <div className="flex items-center gap-2 w-full sm:w-auto flex-1">
                                            <IconFilter />
                                            <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="w-full sm:w-auto p-2 bg-white border border-earth-200 rounded-xl text-sm text-earth-700 outline-none focus:ring-2 focus:ring-earth-300">
                                                <option value="all">全部月份</option>
                                                {availableMonths.map(m => <option key={m} value={m}>{m.replace('-', ' 年 ')} 月</option>)}
                                            </select>
                                            <select value={filterStock} onChange={e => setFilterStock(e.target.value)} className="w-full sm:w-auto p-2 bg-white border border-earth-200 rounded-xl text-sm text-earth-700 outline-none focus:ring-2 focus:ring-earth-300">
                                                <option value="all">全部標的</option>
                                                {availableStocks.map(s => <option key={s.code} value={s.code}>{s.code} {s.name}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="overflow-x-auto hide-scrollbar">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="text-earth-400 font-medium">
                                            <tr>
                                                <th className="p-4 pb-2">標的</th>
                                                <th className="p-4 pb-2 text-right">股數 / 成本</th>
                                                <th className="p-4 pb-2 text-right">現價</th>
                                                <th className="p-4 pb-2 text-right">損益</th>
                                                <th className="p-4 pb-2 text-center w-12"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-earth-100">
                                            {filteredTransactions.map(t => {
                                                const cp = currentPrices[t.code] || t.price;
                                                const v = cp * t.shares;
                                                const net = v - Math.max(Math.floor(v*BASE_FEE_RATE*brokerDiscount), minFee) - Math.floor(v*TAX_RATE);
                                                const p = net - t.totalCost;
                                                return (
                                                    <tr key={t.id} className={`transition-colors hover:bg-earth-50/50 ${t.isReinvest ? 'bg-earth-600/5' : ''}`}>
                                                        <td className="p-4">
                                                            <div className="font-bold text-earth-900 flex items-center gap-1.5">
                                                                {t.code}
                                                                {t.isReinvest && <span className="bg-earth-600 text-white text-[10px] px-1.5 py-0.5 rounded-md font-normal">複利</span>}
                                                            </div>
                                                            <div className="text-xs text-earth-500 mt-0.5">{t.name} <span className="ml-1 opacity-70">({t.date.substring(5)})</span></div>
                                                        </td>
                                                        <td className="p-4 text-right">
                                                            <div className="font-medium text-earth-800">{t.shares.toLocaleString()} 股</div>
                                                            <div className="text-xs text-earth-400 mt-0.5">${t.price}</div>
                                                        </td>
                                                        <td className="p-4">
                                                            <input type="number" value={cp} onChange={e => setCurrentPrices({...currentPrices, [t.code]: parseFloat(e.target.value)||0})} className="w-20 text-right bg-earth-100/50 border border-earth-200 rounded-lg px-2 py-1.5 font-bold text-earth-800 focus:bg-white focus:ring-2 focus:ring-earth-accent outline-none ml-auto block transition-all" />
                                                        </td>
                                                        <td className={`p-4 text-right font-bold ${p>=0?'text-earth-profit':'text-earth-loss'}`}>
                                                            {p>=0?'+':''}{Math.round(p).toLocaleString()}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <button onClick={()=>setTransactions(transactions.filter(x=>x.id!==t.id))} className="text-earth-300 hover:text-earth-loss p-2 rounded-lg hover:bg-earth-50 transition-colors"><IconTrash /></button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                            {filteredTransactions.length === 0 && (
                                                <tr><td colSpan="5" className="p-10 text-center text-earth-400">沒有符合條件的明細。</td></tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>
                        </div>
                    )}

                    {/* 頁面二：股利再投入 */}
                    {activeTab === 'dividend' && (
                        <div className="space-y-6 animate-in fade-in duration-500">
                            <Card className="p-6 bg-earth-600 text-white border-none relative overflow-hidden">
                                <div className="absolute top-0 right-0 -mr-4 -mt-4 opacity-20"><IconPlant /></div>
                                <div className="relative z-10">
                                    <div className="text-earth-200 font-medium mb-1 text-sm">今年預估將收穫的現金股息</div>
                                    <div className="text-4xl font-extrabold tracking-tight">${stats.expectedDiv.toLocaleString()}</div>
                                </div>
                            </Card>
                            
                            <Card className="overflow-hidden bg-white">
                                <div className="p-4 border-b border-earth-100 bg-earth-50/30">
                                    <span className="font-bold text-earth-800 text-sm">第一步：設定與確認收穫</span>
                                </div>
                                <div className="overflow-x-auto hide-scrollbar">
                                    <table className="w-full text-left text-sm whitespace-nowrap">
                                        <thead className="text-earth-400 font-medium bg-white">
                                            <tr>
                                                <th className="p-4 pb-2">標的</th>
                                                <th className="p-4 pb-2">每股配息</th>
                                                <th className="p-4 pb-2 text-right">預估領取</th>
                                                <th className="p-4 pb-2 text-center w-20"></th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-earth-100">
                                            {stats.divBreakdown.map(d => (
                                                <tr key={d.code} className="hover:bg-earth-50 transition-colors">
                                                    <td className="p-4">
                                                        <div className="font-bold text-earth-900">{d.name}</div>
                                                        <div className="text-xs text-earth-500 mt-0.5">庫存 {d.shares} 股</div>
                                                    </td>
                                                    <td className="p-4">
                                                        {editingPolicyCode === d.code ? (
                                                            <div className="flex items-center gap-2">
                                                                <input type="number" step="0.01" value={editForm.cash} onChange={e => setEditForm({cash: e.target.value})} className="w-16 p-1.5 border border-earth-300 rounded-lg text-sm bg-white outline-none focus:border-earth-600" />
                                                                <button onClick={() => {setDividendPolicies({...dividendPolicies, [d.code]: { ...d.policy, cash: parseFloat(editForm.cash)||0 }}); setEditingPolicyCode(null);}} className="text-earth-600 bg-earth-100 p-1.5 rounded-lg hover:bg-earth-200"><IconCheck /></button>
                                                            </div>
                                                        ) : (
                                                            <div className="flex items-center gap-2 group">
                                                                <span className="font-medium text-earth-700">${d.policy.cash}</span>
                                                                <button onClick={() => {setEditForm({cash: d.policy.cash}); setEditingPolicyCode(d.code);}} className="text-earth-300 hover:text-earth-600" title="修改配息"><IconEdit /></button>
                                                                <a href={`https://tw.stock.yahoo.com/quote/${d.code}/dividend`} target="_blank" rel="noopener noreferrer" className="text-earth-300 hover:text-[#BFA054] ml-1 flex items-center justify-center p-1 rounded hover:bg-earth-100 transition-colors" title="快速查詢最新股利">
                                                                    <IconSearch />
                                                                </a>
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="p-4 text-right font-extrabold text-[#A88B46] text-lg">
                                                        ${d.cashIncome.toLocaleString()}
                                                    </td>
                                                    <td className="p-4 text-center">
                                                        <button onClick={() => {setDividendForm({targetCode: d.code, totalDividend: d.cashIncome, targetPrice: currentPrices[d.code]||''}); window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});}} className="bg-earth-100 text-earth-800 hover:bg-earth-200 px-3 py-1.5 rounded-xl text-xs font-bold transition-colors">
                                                            栽種
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </Card>

                            <Card className="p-5 sm:p-6 bg-white border-2 border-earth-200/60 shadow-[0_8px_30px_rgb(82,96,74,0.06)]">
                                <h3 className="font-bold text-earth-800 mb-5 flex items-center gap-2 text-base">
                                    <IconRefresh className="text-earth-600" /> 第二步：自動化複利引擎
                                </h3>
                                <div className="space-y-4">
                                    <div className="bg-earth-50/50 p-4 rounded-2xl border border-earth-100 space-y-3">
                                        <input type="text" placeholder="欲買進的股票代號 (如 0056)" value={dividendForm.targetCode} onChange={e=>setDividendForm({...dividendForm, targetCode: e.target.value})} className="w-full p-3.5 border border-white rounded-xl bg-white shadow-sm font-bold uppercase text-earth-900 focus:outline-none focus:ring-2 focus:ring-earth-300" />
                                        <div className="flex gap-3">
                                            <div className="flex-1 relative">
                                                <span className="absolute left-3 top-3.5 text-earth-400 text-sm font-bold">$</span>
                                                <input type="number" placeholder="可用現金" value={dividendForm.totalDividend} onChange={e=>setDividendForm({...dividendForm, totalDividend: e.target.value})} className="w-full pl-7 p-3.5 border border-white rounded-xl bg-white shadow-sm font-bold text-[#A88B46] focus:outline-none focus:ring-2 focus:ring-earth-300" />
                                            </div>
                                            <div className="flex-1">
                                                <input type="number" placeholder="委託單價" value={dividendForm.targetPrice} onChange={e=>setDividendForm({...dividendForm, targetPrice: e.target.value})} className="w-full p-3.5 border border-white rounded-xl bg-white shadow-sm font-bold text-earth-700 focus:outline-none focus:ring-2 focus:ring-earth-300" />
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {divResult && dividendForm.targetCode && (
                                        <div className="bg-earth-800 text-white p-5 rounded-2xl mt-2 relative overflow-hidden shadow-lg animate-in zoom-in-95 duration-300">
                                            <div className="absolute top-0 right-0 -mr-6 -mt-6 opacity-10"><IconPlant /></div>
                                            <div className="flex justify-between items-end border-b border-earth-600 pb-3 mb-3 relative z-10">
                                                <span className="text-earth-200 font-medium">試算結果 (可買入)</span>
                                                <span className="text-3xl font-extrabold">{divResult.shares} <span className="text-sm font-normal text-earth-300">股</span></span>
                                            </div>
                                            <div className="flex justify-between text-sm text-earth-300 mb-5 relative z-10 font-medium">
                                                <span>找零: ${divResult.rem}</span>
                                                <span>手續費: ${divResult.fee}</span>
                                            </div>
                                            <button onClick={() => executeReinvest(dividendForm.targetCode, parseFloat(dividendForm.targetPrice), divResult.shares, divResult.fee)} disabled={divResult.shares <= 0} className="w-full bg-[#BFA054] hover:bg-[#A88B46] text-white font-bold py-3.5 rounded-xl flex justify-center items-center gap-2 transition-transform active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100 shadow-md relative z-10">
                                                <IconCheck /> 將 {divResult.shares} 股種入庫存
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </Card>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
